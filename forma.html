<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formas</title>
    <link href="css/stils.css" rel="stylesheet" type="text/css">
</head>
<body>
    <h1>Formas un ievadlauku piemērs</h1>
    <form>
        <p>Šodienas datums <input name="datums"></p>
        <p>Ja gribi uzzināt šodienas datumu, spied pogu DATUMS 
            <input onclick="datums.value=new Date();" name="poga" value="DATUMS" type="button">
        </p>
        <p>Ja gribi izdzēst datumua lodziņa saturu, spied pogu RESET
            <input value="RESET" type="reset">
        </p>
    </form>
    <form>
        <div>1.skaitlis<input type="text" name="sk1" id="sk1"></div>
        <div>2.skaitlis<input type="text" name="sk2" id="sk2"></div>
        <div>
            <input type="button" value="+" oneclick="rez.value = Number(sk1.value) + Number(sk2.value)">
            <input type="button" value="-" oneclick="rez.value = Number(sk1.value) - Number(sk2.value)">
            <input type="button" value="*" oneclick="rez.value = Number(sk1.value) * Number(sk2.value)">
            <input type="button" value="/" oneclick="rez.value = Number(sk2.value) !=0 ? Number(sk1.value)/Number(sk2.value): 'Kļūda: dalīšana ar 0'">
            <input type="reset" value="RESET"
        </div>
        
        <hr>
        <div>Rezultāts<input type="text" name=rez readonly></div>
    </form>
</body>
</html>
